<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting detected</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --brand: #1d40f5;
        --brand-soft: #eef4ff;
        --amber-bg: #fffbeb;
        --amber-fg: #92400e;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --fg: #f1f5f9;
          --muted: #94a3b8;
          --border: #1e293b;
          --brand: #3563ff;
          --brand-soft: rgba(53, 99, 255, 0.15);
          --amber-bg: rgba(245, 158, 11, 0.1);
          --amber-fg: #fcd34d;
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        font-family:
          Inter, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
        user-select: none;
      }
      .card {
        margin: 8px;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow:
          0 10px 40px -10px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(53, 99, 255, 0.08);
        overflow: hidden;
        animation: pop 0.22s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes pop {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .top {
        display: flex;
        gap: 12px;
        padding: 16px 16px 12px;
        -webkit-app-region: drag;
      }
      .icon {
        position: relative;
        flex: none;
        width: 38px;
        height: 38px;
        border-radius: 11px;
        background: var(--brand-soft);
        color: var(--brand);
        display: grid;
        place-items: center;
      }
      .icon::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 11px;
        background: var(--brand);
        opacity: 0.35;
        animation: ring 1.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes ring {
        0% {
          transform: scale(0.9);
          opacity: 0.5;
        }
        70%,
        100% {
          transform: scale(1.5);
          opacity: 0;
        }
      }
      .title {
        font-size: 14px;
        font-weight: 600;
      }
      .sub {
        font-size: 13px;
        color: var(--muted);
        margin-top: 2px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
        padding: 3px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge.meet {
        background: #ecfdf5;
        color: #047857;
      }
      .badge.zoom {
        background: #eff6ff;
        color: #1d4ed8;
      }
      @media (prefers-color-scheme: dark) {
        .badge.meet {
          background: rgba(16, 185, 129, 0.15);
          color: #6ee7b7;
        }
        .badge.zoom {
          background: rgba(59, 130, 246, 0.15);
          color: #93c5fd;
        }
      }
      .meta {
        font-size: 11px;
        color: var(--muted);
        margin-left: 8px;
      }
      .consent {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        padding: 9px 16px;
        font-size: 11px;
        line-height: 1.4;
        color: var(--amber-fg);
        background: var(--amber-bg);
        border-top: 1px solid var(--border);
        -webkit-app-region: no-drag;
      }
      .actions {
        display: flex;
        gap: 8px;
        padding: 12px 16px 16px;
        -webkit-app-region: no-drag;
      }
      button {
        flex: 1;
        height: 38px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid transparent;
        transition: background 0.15s;
      }
      button:focus-visible {
        outline: 2px solid var(--brand);
        outline-offset: 2px;
      }
      .secondary {
        background: var(--bg);
        color: var(--fg);
        border-color: var(--border);
      }
      .secondary:hover {
        background: var(--border);
      }
      .primary {
        background: var(--brand);
        color: #fff;
      }
      .primary:hover {
        filter: brightness(1.05);
      }
      .close {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 22px;
        height: 22px;
        flex: none;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        font-size: 15px;
        -webkit-app-region: no-drag;
      }
      .close:hover {
        background: var(--border);
      }
    </style>
  </head>
  <body>
    <div class="card" role="dialog" aria-label="Meeting detected">
      <button class="close" id="close" aria-label="Dismiss">✕</button>
      <div class="top">
        <div class="icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg>
        </div>
        <div style="min-width: 0">
          <div class="title">Meeting detected</div>
          <div class="sub">Would you like to start recording?</div>
          <div>
            <span class="badge zoom" id="badge">Meeting</span>
            <span class="meta" id="meta"></span>
          </div>
        </div>
      </div>
      <div class="consent" id="consent">
        <svg width="14" height="14" style="flex:none;margin-top:1px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>You may need participants’ consent depending on local laws and workplace policy.</span>
      </div>
      <div class="actions">
        <button class="secondary" id="dismiss">Not now</button>
        <button class="primary" id="start">Start Recording</button>
      </div>
    </div>

    <script>
      const badge = document.getElementById('badge')
      const meta = document.getElementById('meta')

      window.meetcapPopup?.onMeeting((m) => {
        const isMeet = m.platform === 'google-meet'
        badge.textContent = isMeet ? 'Google Meet' : 'Zoom'
        badge.className = 'badge ' + (isMeet ? 'meet' : 'zoom')
        meta.textContent = m.title || ''
      })

      document.getElementById('start').addEventListener('click', () => window.meetcapPopup?.start())
      document.getElementById('dismiss').addEventListener('click', () => window.meetcapPopup?.dismiss())
      document.getElementById('close').addEventListener('click', () => window.meetcapPopup?.dismiss())
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') window.meetcapPopup?.dismiss()
        if (e.key === 'Enter') window.meetcapPopup?.start()
      })
      // Focus the primary action for keyboard users.
      window.addEventListener('load', () => document.getElementById('start').focus())
    </script>
  </body>
</html>
